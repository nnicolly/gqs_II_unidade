<h1>Lista de Livros</h1>

<ul>
    {% for livro in livros %}
        <li>
            <strong>{{ livro.titulo }}</strong>
            - {{ livro.ano }}
            - {{ livro.autor.nome }}

            {% if livro.disponivel %}
                - Disponível
            {% else %}
                - Emprestado
            {% endif %}
        </li>
    {% empty %}
        <li>Nenhum livro cadastrado.</li>
    {% endfor %}
</ul>
